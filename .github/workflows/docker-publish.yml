# ML4T Docker Image Build & Publish
#
# Builds, smoke-tests, and pushes all ML4T Docker images to Docker Hub.
# Multi-arch for ml4t and benchmark (amd64 + arm64 on NATIVE runners).
# Single-arch for py312 (amd64 only — signatory/esig/gensim/tfcausalimpact).
#
# Images published:
#   ml4t/ml4t:latest            — Main (Python 3.14, PyTorch CUDA 12.8)
#   ml4t/ml4t-py312:latest      — Python 3.12 (signatory/esig/gensim/pfhedge/tfcausalimpact)
#   ml4t/ml4t-benchmark:latest  — Storage benchmarks (DuckDB, HDF5, DB clients)

name: Docker Publish

on:
  push:
    tags: ["v3.*"]
  workflow_dispatch:
    inputs:
      images:
        description: "Which images to build"
        type: choice
        options: [all, ml4t, py312, benchmark]
        default: all
      no_cache:
        description: "Force rebuild without cache"
        type: boolean
        default: false

env:
  ML4T_IMAGE: ml4t/ml4t
  PY312_IMAGE: ml4t/ml4t-py312
  BENCHMARK_IMAGE: ml4t/ml4t-benchmark

# ============================================================================
# ML4T MAIN — Multi-arch (amd64 + arm64 native runners)
# ============================================================================
jobs:
  build-ml4t:
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.images == 'all' ||
      github.event.inputs.images == 'ml4t'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Free disk space (amd64 — CUDA image needs ~20GB)
        if: matrix.platform == 'linux/amd64'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune -af
          df -h /

      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Platform slug
        id: slug
        run: echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"
        env:
          platform: ${{ matrix.platform }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: envs/ml4t/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.ML4T_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          no-cache: ${{ github.event.inputs.no_cache == 'true' }}
          # Registry cache (Docker Hub auth, long-lived) instead of type=gha:
          # the amd64 CUDA build runs ~22 min and outlives the ~10-min GHA cache
          # SAS token, which 403s mid-import and fails the build. ignore-error
          # keeps a cache hiccup from ever failing the build.
          cache-from: type=registry,ref=${{ env.ML4T_IMAGE }}:buildcache-${{ steps.slug.outputs.pair }}
          cache-to: type=registry,ref=${{ env.ML4T_IMAGE }}:buildcache-${{ steps.slug.outputs.pair }},mode=max,ignore-error=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: ml4t-digest-${{ steps.slug.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-ml4t:
    runs-on: ubuntu-latest
    needs: build-ml4t

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: ml4t-digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Create multi-arch manifest
        run: |
          tags="-t ${{ env.ML4T_IMAGE }}:${{ steps.version.outputs.tag }} -t ${{ env.ML4T_IMAGE }}:latest"
          digests=$(printf '${{ env.ML4T_IMAGE }}@sha256:%s ' $(ls /tmp/digests/))
          docker buildx imagetools create $tags $digests

  smoke-ml4t:
    needs: merge-ml4t
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Import test (${{ matrix.arch }})
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app:ro \
            -e PYTHONPATH=/app \
            -e ML4T_PATH=/app \
            -e ML4T_DATA_PATH=/data \
            ${{ env.ML4T_IMAGE }}:latest \
            python /app/envs/test_all_imports.py

      - name: Computation smoke test (${{ matrix.arch }})
        run: |
          docker run --rm ${{ env.ML4T_IMAGE }}:latest python -c "
          import numpy as np, polars as pl, torch, sklearn, lightgbm
          print(f'numpy {np.__version__}')
          print(f'polars {pl.__version__}')
          print(f'torch {torch.__version__}, CUDA: {torch.cuda.is_available()}')
          print(f'lightgbm {lightgbm.__version__}')
          print(f'sklearn {sklearn.__version__}')
          # Quick computation test
          X = np.random.randn(100, 5)
          model = sklearn.linear_model.Ridge(alpha=1.0).fit(X, np.random.randn(100))
          print(f'Ridge fit OK, coefs shape: {model.coef_.shape}')
          print('Smoke test passed')
          "

  # ============================================================================
  # PY312 — Single-arch (amd64 only)
  # ============================================================================
  build-py312:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.images == 'all' ||
      github.event.inputs.images == 'py312'

    steps:
      - name: Free disk space (signature stack + ML deps ~5GB)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune -af
          df -h /

      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push py312
        uses: docker/build-push-action@v6
        with:
          context: .
          file: envs/py312/Dockerfile
          push: true
          tags: |
            ${{ env.PY312_IMAGE }}:latest
            ${{ env.PY312_IMAGE }}:${{ steps.version.outputs.tag }}
          no-cache: ${{ github.event.inputs.no_cache == 'true' }}
          cache-from: type=gha,scope=py312
          cache-to: type=gha,scope=py312,mode=max
          platforms: linux/amd64

      - name: Smoke test — py312 imports
        run: |
          docker run --rm ${{ env.PY312_IMAGE }}:latest python -c "
          import signatory; print(f'signatory {signatory.__version__}')
          import esig; print('esig OK')
          import gensim; print(f'gensim {gensim.__version__}')
          import torch; print(f'torch {torch.__version__}')
          import kaleido, importlib.metadata; print(f'kaleido {importlib.metadata.version(\"kaleido\")}')
          import causalimpact; print('pycausalimpact OK')
          import pfhedge; print(f'pfhedge {pfhedge.__version__}')
          print('ALL PY312 IMPORTS OK')
          "

  # ============================================================================
  # BENCHMARK — Multi-arch (amd64 + arm64 on NATIVE runners)
  # ============================================================================
  build-benchmark:
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.images == 'all' ||
      github.event.inputs.images == 'benchmark'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Platform slug
        id: slug
        run: echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"
        env:
          platform: ${{ matrix.platform }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: envs/benchmark/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.BENCHMARK_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          no-cache: ${{ github.event.inputs.no_cache == 'true' }}
          cache-from: type=gha,scope=benchmark-${{ steps.slug.outputs.pair }}
          cache-to: type=gha,scope=benchmark-${{ steps.slug.outputs.pair }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-digest-${{ steps.slug.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-benchmark:
    runs-on: ubuntu-latest
    needs: build-benchmark

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: benchmark-digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Create multi-arch manifest
        run: |
          tags="-t ${{ env.BENCHMARK_IMAGE }}:${{ steps.version.outputs.tag }} -t ${{ env.BENCHMARK_IMAGE }}:latest"
          digests=$(printf '${{ env.BENCHMARK_IMAGE }}@sha256:%s ' $(ls /tmp/digests/))
          docker buildx imagetools create $tags $digests

  smoke-benchmark:
    runs-on: ubuntu-latest
    needs: merge-benchmark

    steps:
      - name: Smoke test — benchmark imports
        run: |
          docker run --rm ${{ env.BENCHMARK_IMAGE }}:latest python -c "
          import duckdb; print(f'duckdb {duckdb.__version__}')
          import tables; print(f'PyTables {tables.__version__}')
          import polars; print(f'polars {polars.__version__}')
          import kaleido, importlib.metadata; print(f'kaleido {importlib.metadata.version(\"kaleido\")}')
          import plotly.graph_objects as go, plotly.io as pio
          png = pio.to_image(go.Figure(go.Scatter(x=[1,2], y=[3,4])), format='png')
          assert len(png) > 1000, 'kaleido PNG render produced empty output'
          print(f'plotly PNG render OK ({len(png)} bytes)')
          print('ALL BENCHMARK IMPORTS OK')
          "
