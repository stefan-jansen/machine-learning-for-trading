# ML4T ETF Data Configuration
# ============================
# 100 diversified ETFs as CANDIDATE POOL across 9 categories
# Yahoo Finance data source (free, no API key required)
#
# IMPORTANT: This is the CANDIDATE universe. The strategy definition
# process (Chapter 6) filters this down based on:
# - Liquidity ($50M/day minimum)
# - History (10+ years preferred)
# - Correlation clustering (distinct return drivers)
# - Effective bets analysis
#
# Products: 100 curated ETFs
# Date range: 2006-01-01 to 2025-12-31 (20 years)
# Estimated cost: Free
#
# Usage:
#   from data.loaders import load_etfs
#   etf_data = load_etfs()

etfs:
  provider: yahoo
  start: '2006-01-01'
  end: '2025-12-31'
  frequency: daily
  storage_path: etfs/market

  # 100 ETF Candidate Universe across 9 categories
  # Design rationale:
  # - Comprehensive coverage for universe engineering demonstration
  # - Includes overlapping exposures to show correlation clustering
  # - Final strategy universe will be ~80 ETFs after filtering
  # - No leveraged/inverse ETFs
  # - No crypto ETFs (separate case study)

  tickers:
    us_equity_broad:
      description: "US broad market ETFs - large, mid, small cap, equal weight"
      symbols:
        - SPY   # SPDR S&P 500
        - QQQ   # Invesco QQQ (NASDAQ-100)
        - IWM   # iShares Russell 2000
        - DIA   # SPDR Dow Jones Industrial
        - VTI   # Vanguard Total Stock Market
        - MDY   # SPDR S&P MidCap 400
