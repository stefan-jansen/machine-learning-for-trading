# DataBento Futures Download Configuration
#
# This file configures the futures data download from DataBento.
# Run with: python data/futures/download.py
#
# Design principles:
# - Idempotent: Running multiple times only downloads missing data
# - Incremental: Readers can extend data by updating end_date
# - Hive-partitioned: Data stored by product/year for efficient updates
#
# Cost estimate: ~$0.58 per product per 10 years hourly x 3 tenors
# Total for 30 products x 15 years x 3 tenors = ~$75

# DataBento dataset and schema
dataset: "GLBX.MDP3"  # CME Globex
schema: "ohlcv-1h"     # Hourly OHLCV (not daily - UTC alignment issues)

# Roll methodology: volume-based (.v.) vs calendar-based (.c.)
# Volume roll switches when previous day's volume shows next contract > current
# This is more realistic for trading (you know yesterday's volume at today's open)
roll_type: "v"  # "v" = volume, "c" = calendar

# Continuous contract positions to download
# 0 = front month, 1 = second month, 2 = third month
tenors: [0, 1, 2]

# Default date range (can be overridden per product)
default_start: "2011-01-01"
default_end: "2025-12-31"

# Storage configuration
# Hive partitioning: futures/continuous/product={PRODUCT}/year={YEAR}/data.parquet
storage:
  format: "parquet"
  partitioning: "hive"  # Enables easy incremental updates by year
  compression: "zstd"

# Product universe - 30 products for core pack
# Organized by category with notes on data availability
products:
