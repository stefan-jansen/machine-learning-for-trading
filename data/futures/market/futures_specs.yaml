# CME Futures Product Specifications
#
# Static product-level configuration for 36 CME futures products.
# Used for:
# - Contract symbol generation
# - Expiration date inference
# - P&L calculation (multiplier)
# - Position sizing (tick_size)
#
# No Databento API call needed - this is static reference data.
#
# Sources:
# - CME Group contract specifications
# - Databento unit_of_measure_qty field (where available)
#
# initial_margin_pct / maintenance_margin_pct:
#   Per-product percentage-of-notional initial and maintenance margin,
#   wired through ContractSpec.margin_pct -> Broker.margin_pct_schedule
#   (ml4t-backtest >= 0.1.0b18). The dollar margin tracks price changes
#   naturally while the rate stays constant; only the rate needs to be
#   re-anchored when CME publishes a new SPAN schedule.
#
#   Derivation (per product, where available):
#     maintenance_pct = first-row CSV maintenance$
#                       / (multiplier x front-month close on 2025-12-31)
#     initial_pct     = 1.10 x maintenance_pct  (CME SPAN convention)
#
#   Source for CSV maintenance$:
#     reference/outrightrates.csv (CME outright rates download, 2026-05-16)
#     Covers 22 of 36 products. Missing from CSV: equity-index e-minis
#     (ES/NQ/YM/RTY), energy front-month (CL/NG/HO/RB), lumber (LBR),
#     palladium (PA), and Mexican peso (6M); for these we fall back to a
#     per-category SPAN-style approximation (5% equity_index, 8% energy,
#     8% lumber, 5% metals for PA, 2% fx for 6M). 14 products use fallback.
#
#   Front-month prices come from
#     data/futures/market/continuous/daily/continuous_daily.parquet (tenor=0).
#   See `case_studies/utils/backtest_loaders.py::load_contract_specs_from_yaml`
#   for the YAML->ContractSpec wiring.

